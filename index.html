                             <button type="submit" disabled={isLoading} className="bg-indigo-600 text-white py-2 px-5 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:bg-indigo-400">{isLoading ? 'در حال ذخیره...' : 'ذخیره تغییرات'}</button>
                        </div>
                    </form>
                </Modal>
            );
        };

        const ManageDemandItemsModal = ({ isOpen, onClose, onSave, demandToEdit, products, defaultStatusId, isProductsLoading }) => {
            const [items, setItems] = React.useState([]);
            const [originalItemIds, setOriginalItemIds] = React.useState(new Set());
            const [error, setError] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);
            const [isEmergency, setIsEmergency] = React.useState(false);

            React.useEffect(() => {
                if (demandToEdit) {
                    const initialItems = demandToEdit.demand_item.map(item => ({ 
                        ...item, 
                        productid: item.product?.id, // Ensure productid is set for the select safely
                        key: crypto.randomUUID() 
                    }));
                    setItems(initialItems);
                    setOriginalItemIds(new Set(initialItems.map(item => item.id)));
                    setIsEmergency(demandToEdit.is_emergency || false);
                }
            }, [demandToEdit]);

            if (!demandToEdit) return null;

            const handleAddItem = () => {
                setItems([...items, { productid: '', quantity: '', demand_admin_note: '', supply_admin_note: '', key: crypto.randomUUID() }]);
            };

            const handleItemChange = (index, field, value) => {
                const newItems = [...items];
                newItems[index][field] = value;
                setItems(newItems);
            };

            const handleRemoveItem = (index) => {
                setItems(items.filter((_, i) => i !== index));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (items.length === 0 || items.some(i => !i.productid || !i.quantity)) {
                    setError('لطفا تمام کالاها را انتخاب کرده و تعداد آنها را مشخص کنید.');
                    return;
                }
                
                setIsLoading(true);
                setError('');

                try {
                    const finalItemIds = new Set(items.filter(i => i.id).map(i => i.id));
                    const itemIdsToDelete = [...originalItemIds].filter(id => !finalItemIds.has(id));
                    
                    if (itemIdsToDelete.length > 0) {
                        // Also delete from supplier_demand_assignment
                        await supabaseClient.from('supplier_demand_assignment').delete().in('demand_item_id', itemIdsToDelete);
                        await supabaseClient.from('demandstatuslog').delete().in('demand_item_id', itemIdsToDelete);
                        const { error: deleteError } = await supabaseClient.from('demand_item').delete().in('id', itemIdsToDelete);
                        if (deleteError) throw deleteError;
                    }

                    const itemsToAdd = items.filter(item => !item.id);
                    const itemsToUpdate = items.filter(item => item.id && originalItemIds.has(item.id));

                    if (itemsToAdd.length > 0) {
                        const newItemsData = itemsToAdd.map(item => ({
                            demandid: demandToEdit.id,
                            productid: item.productid,
                            quantity: Number(item.quantity),
                            demand_admin_note: item.demand_admin_note,
                            supply_admin_note: item.supply_admin_note,
                            demandstatusid: defaultStatusId
                        }));
                        const { data: insertedItems, error: addError } = await supabaseClient.from('demand_item').insert(newItemsData).select();
                        if (addError) throw addError;

                        const logsToInsert = insertedItems.map(item => ({ demand_item_id: item.id, demandstatusid: defaultStatusId }));
                         if (logsToInsert.length > 0) {
                             const { error: logError } = await supabaseClient.from('demandstatuslog').insert(logsToInsert);
                             if (logError) console.error("Error logging status for new items:", logError);
                          }
                    }
                    
                    if (itemsToUpdate.length > 0) {
                       const updatePromises = itemsToUpdate.map(item => 
                            supabaseClient.from('demand_item').update({
                                quantity: Number(item.quantity),
                                demand_admin_note: item.demand_admin_note,
                                supply_admin_note: item.supply_admin_note,
                                productid: item.productid,
                            }).eq('id', item.id)
                        );
                        const results = await Promise.all(updatePromises);
                        results.forEach(({ error }) => {
                            if (error) throw error;
                        });
                    }

                    if (demandToEdit.is_emergency !== isEmergency) {
                        const { error: demandUpdateError } = await supabaseClient
                            .from('demand')
                            .update({ is_emergency: isEmergency })
                            .eq('id', demandToEdit.id);
                        if (demandUpdateError) throw demandUpdateError;
                    }

                    onSave();
                } catch(err) {
                    console.error("Error managing demand items:", err);
                    setError(`خطا در ذخیره تغییرات: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

             const productOptions = products.map(p => {
                 const telegramCodeProp = p.productproperty?.find(
                     prop => prop.propertykey?.title?.toLowerCase().includes('تلگرام')
                 );
                 const telegramCode = telegramCodeProp ? telegramCodeProp.value : '';
                 const displayTitle = `(ID: ${p.id}) ${telegramCode ? `[${telegramCode}] ` : ''}${p.brand ? p.brand.title + ' ' : ''}${p.title}`;
                 // ارسال تصویر به Select
                 return { id: p.id, title: displayTitle, image: p.image_url };
             });

            return (
                <Modal isOpen={isOpen} onClose={onClose} title={`مدیریت اقلام تقاضای ${formatProfileName(demandToEdit.profiles)}`}>
                    <form onSubmit={handleSubmit} className="space-y-6">
                        <div className="p-3 bg-gray-100 dark:bg-gray-900 rounded-lg text-sm">
                            <p><span className="font-semibold text-gray-700 dark:text-gray-300">شناسه تقاضا:</span> {demandToEdit.id}</p>
                            <p><span className="font-semibold text-gray-700 dark:text-gray-300">تاریخ ثبت:</span> {formatDateTime(demandToEdit.createdat)}</p>
                        </div>

                        <div className="flex items-center">
                            <input type="checkbox" id="is_emergency_manage_items" checked={isEmergency} onChange={(e) => setIsEmergency(e.target.checked)} className="ml-2 h-4 w-4 rounded text-red-600 border-red-300 focus:ring-red-500" />
                            <label htmlFor="is_emergency_manage_items" className="text-sm font-medium">تقاضای فوری</label>
                        </div>
                        
                        <div className="border-t border-gray-200 dark:border-gray-700 pt-4">
                            <h3 className="text-lg font-semibold mb-2 flex items-center gap-2">
                                اقلام درخواستی
                                {isProductsLoading && <span className="text-xs font-normal text-indigo-500 bg-indigo-50 dark:bg-indigo-900/40 px-2 py-0.5 rounded-full flex items-center gap-1"><span className="spinner w-3 h-3 border-[1.5px] border-indigo-500 m-0"></span> در حال دریافت اطلاعات محصولات...</span>}
                            </h3>
                            <div className="space-y-3">
                                {items.map((item, index) => {
                                    const selectedProduct = products.find(p => p.id === item.productid);
                                    return (
                                    <div key={item.key} className="p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg border border-gray-100 dark:border-gray-700">
                                        <div className="grid grid-cols-1 md:grid-cols-5 items-end gap-x-4 gap-y-3">
                                            <div className="md:col-span-3 flex gap-3 items-end">
                                                {/* نمایش عکس کالا کنار سلکتور */}
                                                {selectedProduct && (
                                                    selectedProduct.image_url ? (
                                                        <img src={selectedProduct.image_url} alt="" loading="lazy" className="w-16 h-16 rounded-lg object-cover border border-gray-300 dark:border-gray-600 shadow-sm hover:scale-110 transition-transform duration-300" />
                                                    ) : (
                                                        <div className="w-16 h-16 rounded-lg bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 flex items-center justify-center text-xs text-gray-400 shadow-sm">بدون عکس</div>
                                                    )
                                                )}
                                                <div className="flex-1">
                                                    <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">محصول</label>
                                                    <SearchableSelect 
                                                        options={productOptions} 
                                                        value={item.productid} 
                                                        onChange={(id) => handleItemChange(index, 'productid', id)} 
                                                        placeholder={isProductsLoading ? "درحال بارگذاری لیست محصولات..." : "جستجوی محصول با نام یا کد..."}
                                                        disabled={isProductsLoading}
                                                    />
                                                </div>
                                            </div>
                                            <div className="md:col-span-1">
                                                <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">تعداد</label>
                                                <input type="number" value={item.quantity} onChange={(e) => handleItemChange(index, 'quantity', e.target.value)} className="w-full bg-white dark:bg-gray-600 p-2 rounded-lg text-sm border border-transparent focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="تعداد" min="1" required />
                                            </div>
                                            <div className="flex justify-end"><button type="button" onClick={() => handleRemoveItem(index)} className="text-red-500 hover:text-red-700 p-2 mb-1">✕</button></div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                                            <textarea value={item.demand_admin_note || ''} onChange={(e) => handleItemChange(index, 'demand_admin_note', e.target.value)} placeholder="یادداشت مدیر تقاضا..." className="w-full text-sm bg-white dark:bg-gray-600 p-2 rounded-lg border border-transparent focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500" rows="2"></textarea>
                                            <textarea value={item.supply_admin_note || ''} onChange={(e) => handleItemChange(index, 'supply_admin_note', e.target.value)} placeholder="یادداشت مدیر تامین..." className="w-full text-sm bg-white dark:bg-gray-600 p-2 rounded-lg border border-transparent focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500" rows="2"></textarea>
                                        </div>
                                    </div>
                                )})}
                            </div>
                            <button type="button" onClick={handleAddItem} className="mt-4 w-full text-center py-2 px-4 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition font-semibold">+ افزودن کالا</button>
                        </div>
                        
                        {error && <p className="text-red-500 text-sm">{error}</p>}

                            <button type="button" onClick={onClose} className="bg-gray-200 dark:bg-gray-600 py-2 px-5 rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-gray-700 transition">بازگشت</button>
                            <button type="submit" disabled={isLoading} className="bg-indigo-600 text-white py-2 px-5 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:bg-indigo-400">{isLoading ? 'در حال ذخیره...' : 'ذخیره تغییرات'}</button>
                        </div>
                    </form>
                </Modal>
            );
        };
        
        // ==================================================
        // Toast Notification System
        // ==================================================
        const ToastContext = React.createContext();

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = React.useState([]);
            const idCounter = React.useRef(0);

            const addToast = React.useCallback((message, type = 'success') => {
                const id = idCounter.current++;
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(toast => toast.id !== id));
                }, 4000);
            }, []);

            const ToastIcon = ({ type }) => {
             if (type === 'success') {
               return <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
             }
             if (type === 'error') {
                 return <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
             }
             return null;
            }

            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed bottom-5 left-5 z-[200] space-y-3">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`flex items-center gap-3 p-4 rounded-lg shadow-lg text-white w-64 animate-toast-in ${toast.type === 'success' ? 'bg-green-500' : 'bg-red-500'}`}>
                                <ToastIcon type={toast.type} />
                                <span className="font-semibold">{toast.message}</span>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };
        const useToasts = () => React.useContext(ToastContext);


        // ==================================================
        // The Main Application Component
        // ==================================================
        const DemandManagement = ({ theme, toggleTheme }) => {
            const [activeTab, setActiveTab] = React.useState('demands'); // 'demands' or 'retargeting'
            const [demands, setDemands] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(true);
            const [isBasicRefLoading, setIsBasicRefLoading] = React.useState(true); // NEW: Fast load state
            const [isProductsLoading, setIsProductsLoading] = React.useState(true); // NEW: Slow load state
            const [error, setError] = React.useState('');
            const [isModalOpen, setIsModalOpen] = React.useState(false);
            const [isEditItemModalOpen, setIsEditItemModalOpen] = React.useState(false); 
            const [editingItem, setEditingItem] = React.useState(null); 
            const [editingDemand, setEditingDemand] = React.useState(null);
            const [isManageItemsModalOpen, setIsManageItemsModalOpen] = React.useState(false);
            const [demandToManage, setDemandToManage] = React.useState(null);
            
            // Retargeting State
            const [retargetingItems, setRetargetingItems] = React.useState([]);
            const [isRetargetingLoading, setIsRetargetingLoading] = React.useState(false);
            const [retargetingSearchTerm, setRetargetingSearchTerm] = React.useState('');
            const [retargetingTimeFilter, setRetargetingTimeFilter] = React.useState('all');
            const [retargetingCancellationFilter, setRetargetingCancellationFilter] = React.useState('all');

            // --- NEW: Pre-Demand (Offer) State ---
            const [preDemandCustomerId, setPreDemandCustomerId] = React.useState('');
            const [preDemandTimeframe, setPreDemandTimeframe] = React.useState('90');
            const [preDemandItems, setPreDemandItems] = React.useState([]);
            const [isPreDemandLoading, setIsPreDemandLoading] = React.useState(false);
            const [demandModalInitialData, setDemandModalInitialData] = React.useState(null);

            const [customers, setCustomers] = React.useState([]);
            const [products, setProducts] = React.useState([]);
            const [demandStatuses, setDemandStatuses] = React.useState([]);
            const [defaultStatusId, setDefaultStatusId] = React.useState(null);
            const [confirmState, setConfirmState] = React.useState({ isOpen: false, onConfirm: null, message: '', title: '' });

            // Currency State
            const [currency, setCurrency] = React.useState(null);
            
            // Shared reference data for user creation
            const [customerRoleId, setCustomerRoleId] = React.useState(null);
            const [marketingChannels, setMarketingChannels] = React.useState([]);
            const [provinces, setProvinces] = React.useState([]);

            const [countdown, setCountdown] = React.useState(300); // 5 minutes in seconds
            const [searchTerm, setSearchTerm] = React.useState('');
            const [statusFilter, setStatusFilter] = React.useState('open'); 
            const [emergencyFilter, setEmergencyFilter] = React.useState(false); 
            const [awaitingCustomerFilter, setAwaitingCustomerFilter] = React.useState(false);
            
            const { addToast } = useToasts();
            const statusFilterRef = React.useRef(statusFilter);

            React.useEffect(() => {
                statusFilterRef.current = statusFilter;
            }, [statusFilter]);

            const fetchAllProducts = async () => {
                let allProducts = [];
                let page = 0;
                let productsLastFetch;
                const pageSize = 1000;

                do {
                    const { data, error } = await supabaseClient
                        .from('product')
                        .select('id, title, image_url, brand(id, title), productproperty(value, propertykey(id, title))')
                        .eq('isdeleted', false)
                        .range(page * pageSize, (page + 1) * pageSize - 1);

                    if (error) {
                        console.error("Error fetching products page:", error);
                        throw error;
                    }

                    productsLastFetch = data || [];
                    allProducts = allProducts.concat(productsLastFetch);
                    page++;

                } while (productsLastFetch.length === pageSize);

                return allProducts;
            };

            const fetchCurrencies = async () => {
                try {
                    const { data, error } = await supabaseClient
                        .from('irancurrency')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(1)
                        .single();
                    
                    if (error) {
                        if (error.code !== 'PGRST116') console.error("Error fetching currencies:", error);
                    } else {
                        setCurrency(data);
                    }
                } catch (e) {
                    console.error("Currency fetch exception:", e);
                }
            };

            const fetchDemands = async (currentFilter = 'open', isAutoRefresh = false) => {
                if (!isAutoRefresh) setIsLoading(true);
                setError('');
                try {
                    // ساخت کوئری داینامیک: اگر فیلتر 'all' نباشد از inner join استفاده می‌کنیم تا فقط رکوردهای مرتبط از دیتابیس دریافت شوند
                    const itemJoin = currentFilter !== 'all' ? 'demand_item!inner' : 'demand_item';
                    const statusJoin = currentFilter !== 'all' ? 'demandstatustype!inner' : 'demandstatustype';
                    
                    const selectStr = `
                        id, createdat, deadlinedate, is_emergency, 
                        profiles(id, fullname, firstname, mobile), 
                        location(id, address, city(title, province(title))), 
                        ${itemJoin}(
                            id, quantity, approved_supply_price, approved_supply_quantity, demand_admin_note, supply_admin_note, demandstatusid, productid, 
                            product(id, title, image_url, brand(title), productproperty(value, propertykey(title))), 
                            ${statusJoin}(id, main_status, title_farsi)
                        )
                    `;

                    let query = supabaseClient
                        .from('demand')
                        .select(selectStr)
                        .order('createdat', { ascending: false }); 
                        
                    // اعمال فیلتر مستقیم روی دیتابیس برای جلوگیری از دریافت داده‌های اضافی (کاهش شدید مصرف اینترنت و رم)
                    if (currentFilter !== 'all') {
                        let statusValue = 'Open';
                        if (currentFilter === 'fulfilled') statusValue = 'Fulfilled';
                        if (currentFilter === 'cancelled') statusValue = 'Cancelled';
                        
                        query = query.eq('demand_item.demandstatustype.main_status', statusValue);
                    }
                    
                    const { data: demandData, error: demandError } = await query;
                        
                    if (demandError) throw demandError;
                    
                    const demandsWithCalculatedStatus = demandData.map(d => {
                        let status = currentFilter !== 'all' ? currentFilter : 'open';
                        
                        if (d.demand_item && d.demand_item.length > 0) {
                            const allItemsAreClosed = d.demand_item.every(
                                item => item.demandstatustype?.main_status === 'Fulfilled' || item.demandstatustype?.main_status === 'Cancelled'
                            );

                            if (allItemsAreClosed) {
                                const hasAtLeastOneFulfilled = d.demand_item.some(
                                    item => item.demandstatustype?.main_status === 'Fulfilled'
                                );
                                status = hasAtLeastOneFulfilled ? 'fulfilled' : 'cancelled';
                            } else {
                                status = 'open';
                            }
                        }

                        const totalValue = (d.demand_item || []).reduce((sum, item) => {
                            const price = item.approved_supply_price || 0;
                            const quantity = item.approved_supply_quantity || 0;
                            return sum + (price * quantity);
                        }, 0);

                        return { ...d, status, totalValue };
                    });
                    
                    // چون فیلتر سمت سرور انجام شده، دیگر نیازی به فیلتر مجدد آرایه سمت کلاینت نیست
                    setDemands(demandsWithCalculatedStatus || []);

                } catch (err) {
                    console.error("Error fetching demand data:", err);
                    setError(`خطا در بارگذاری تقاضاها: ${err.message}`);
                    if (!isAutoRefresh) addToast('خطا در بارگذاری اطلاعات', 'error');
                } finally {
                    if (!isAutoRefresh) setIsLoading(false);
                }
            };

            // تابع سریع: فقط اطلاعات پایه ضروری (مشتری، استان، کانال، نقش) را می‌گیرد
            const fetchBasicRefData = async () => {
                setIsBasicRefLoading(true);
                try {
                    const customerRoleRes = await supabaseClient.from('role').select('id').eq('title', 'Customer').single();
                    setCustomerRoleId(customerRoleRes.data?.id);

                    const [customerRes, statusesRes, channelsRes, provincesRes] = await Promise.all([
                        supabaseClient.from('profiles').select('id, fullname, firstname, mobile, role:roleid(title)').eq('isdeleted', false).order('fullname'),
                        supabaseClient.from('demandstatustype').select('id, main_status, title_farsi').order('main_status').order('id'),
                        supabaseClient.from('marketingchannel').select('id, title').order('title'),
                        supabaseClient.from('province').select('id, title').order('title')
                    ]);
                    
                    setCustomers(customerRes.data || []);
                    setDemandStatuses(statusesRes.data || []);
                    setMarketingChannels(channelsRes.data || []);
                    setProvinces(provincesRes.data || []);
                    
                    const defaultStatus = statusesRes.data?.find(s => s.title_farsi === 'در انتظار تامین');
                    if (defaultStatus) {
                        setDefaultStatusId(defaultStatus.id);
                    } else {
                        setDefaultStatusId(statusesRes.data?.[0]?.id || null);
                    }
                } catch (err) {
                    console.error("Error fetching basic reference data:", err);
                } finally {
                    setIsBasicRefLoading(false); // فعال شدن دکمه ثبت تقاضا
                }
            };

            // تابع سنگین: فقط محصولات را می‌گیرد
            const fetchProductsInBackground = async () => {
                setIsProductsLoading(true);
                try {
                    const productsRes = await fetchAllProducts();
                    setProducts(productsRes || []);
                } catch (err) {
                    console.error("Error fetching products data:", err);
                } finally {
                    setIsProductsLoading(false);
                }
            };

            React.useEffect(() => { 
                fetchDemands(statusFilter); 
            }, [statusFilter]); // با تغییر تب فیلتر، دیتای جدید واکشی می‌شود

            React.useEffect(() => { 
                fetchBasicRefData().then(() => {
                    fetchProductsInBackground(); 
                });
                
                // تاخیر ۵ ثانیه‌ای برای لود کردن ارزها
                setTimeout(() => {
                    fetchCurrencies();
                }, 5000);
            }, []);

            // Fetch Retargeting Data when tab changes
            React.useEffect(() => {
                if (activeTab === 'retargeting') {
                    fetchRetargetingData();
                }
            }, [activeTab]);

            const fetchRetargetingData = async () => {
                setIsRetargetingLoading(true);
                try {
                    // 1. واکشی مستقیم آیتم‌های لغو شده از دیتابیس فارغ از وضعیت تقاضاها در تب قبلی
                    const { data: cancelledItemsData, error: cancelledError } = await supabaseClient
                        .from('demand_item')
                        .select(`
                            id, quantity, productid, demand_admin_note, createdat,
                            demandstatustype!inner(main_status),
                            product(id, title, image_url, brand(title)),
                            demand!inner(id, createdat, profiles(id, fullname, firstname, mobile), location(id, address, city(title, province(title))))
                        `)
                        .eq('demandstatustype.main_status', 'Cancelled')
                        .order('createdat', { ascending: false })
                        .limit(300);

                    if (cancelledError) throw cancelledError;

                    const cancelled = [];
                    (cancelledItemsData || []).forEach(item => {
                        if (item.product || item.productid) {
                            // عدم نمایش مواردی که قبلا بازاریابی مجدد شده‌اند
                            if (item.demand_admin_note && item.demand_admin_note.includes('[Retargeted]')) return;

                            cancelled.push({
                                ...item,
                                productid: item.productid || item.product?.id,
                                customer: item.demand?.profiles,
                                location: item.demand?.location,
                                demandDate: item.demand?.createdat || item.createdat
                            });
                        }
                    });

                    if (cancelled.length === 0) {
                        setRetargetingItems([]);
                        setIsRetargetingLoading(false);
                        return;
                    }

                    // 2. Fetch current stock for these products
                    const productIds = [...new Set(cancelled.map(i => i.productid))].filter(id => id !== undefined && id !== null);
                    
                    if (productIds.length === 0) {
                         setRetargetingItems([]);
                         setIsRetargetingLoading(false);
                         return;
                    }

                    // Note: Supabase limits 'in' filter to a certain number of items, usually enough for this scale.
                    const { data: stock, error } = await supabaseClient
                        .from('supplierstock')
                        .select('productid, unitprice, lastupdatedat, supplieruserid, profiles:supplieruserid(fullname, firstname, mobile, emergencyphonenumber)')
                        .in('productid', productIds);
                        
                    if (error) throw error;

                    // 3. Match Stock to Cancelled Items
                    const opportunities = cancelled.map(item => {
                        // Find suppliers who have stock for this item's product
                        const availableSuppliers = stock ? stock.filter(s => s.productid === item.productid) : [];
                        return {
                            ...item,
                            availableSuppliers
                        };
                    }).filter(item => item.availableSuppliers.length > 0); // Only keep items where at least one supplier has stock

                    setRetargetingItems(opportunities);

                } catch (e) {
                    console.error("Retargeting fetch error", e);
                    addToast("خطا در دریافت لیست بازاریابی مجدد", "error");
                } finally {
                    setIsRetargetingLoading(false);
                }
            };

            // --- NEW: Pre-Demand Logic ---
            const generatePreDemandList = async () => {
                if (!preDemandCustomerId) {
                    addToast("ابتدا یک مشتری را انتخاب کنید.", "error");
                    return;
                }
                
                setIsPreDemandLoading(true);
                setPreDemandItems([]);
                try {
                    // 1. Calculate cutoff date
                    const cutoff = new Date();
                    cutoff.setDate(cutoff.getDate() - parseInt(preDemandTimeframe));

                    // 2. Filter fulfilled or open demands for this customer in the timeframe
                    const customerDemands = demands.filter(d => 
                        d.profiles?.id === preDemandCustomerId &&
                        new Date(d.createdat) >= cutoff
                    );

                    // 3. Aggregate products and quantities
                    const productAgg = {};
                    customerDemands.forEach(d => {
                        d.demand_item.forEach(item => {
                            if (!item.product) return;
                            // Ignore cancelled items from history calculation
                            if (item.demandstatustype?.main_status === 'Cancelled') return;

                            if (!productAgg[item.product.id]) {
                                productAgg[item.product.id] = {
                                    product: item.product,
                                    totalHistoryQty: 0,
                                    orderCount: 0,
                                };
                            }
                            productAgg[item.product.id].totalHistoryQty += item.quantity || 0;
                            productAgg[item.product.id].orderCount += 1;
                        });
                    });

                    const productIds = Object.keys(productAgg);
                    if (productIds.length === 0) {
                        addToast("هیچ سابقه خرید موفقی در این بازه زمانی برای مشتری یافت نشد.", "error");
                        setIsPreDemandLoading(false);
                        return;
                    }

                    // 4. Fetch current market prices from supplier stock for these products
                    const { data: stockData, error: stockError } = await supabaseClient
                        .from('supplierstock')
                        .select('productid, unitprice, profiles:supplieruserid(fullname)')
                        .in('productid', productIds);
                    
                    if (stockError) throw stockError;

                    // 5. Build the final list with calculated averages
                    const months = Math.max(1, parseInt(preDemandTimeframe) / 30);
                    const finalItems = productIds.map(pid => {
                        const agg = productAgg[pid];
                        const monthlyAvg = Math.ceil(agg.totalHistoryQty / months);
                        // Suggestion logic: Use monthly average as base, or history if it's small. User can edit.
                        const suggestedQty = monthlyAvg > 0 ? monthlyAvg : agg.totalHistoryQty;

                        // Get current market prices for this product
                        const productStocks = stockData ? stockData.filter(s => s.productid === pid && s.unitprice > 0) : [];
                        // Sort by price ascending
                        productStocks.sort((a,b) => a.unitprice - b.unitprice);
                        
                        // Create a summary string of the best 2-3 prices
                        const priceSummary = productStocks.slice(0, 3).map(s => 
                            `${formatCurrency(s.unitprice)} (${s.profiles?.fullname.split(' ')[0]})`
                        ).join(' | ');

                        return {
                            id: pid,
                            product: agg.product,
                            totalHistoryQty: agg.totalHistoryQty,
                            monthlyAvg,
                            suggestedQty,
                            marketPrices: priceSummary || 'قیمت روز موجود نیست'
                        };
                    });

                    // Sort by highest historical quantity
                    finalItems.sort((a,b) => b.totalHistoryQty - a.totalHistoryQty);
                    setPreDemandItems(finalItems);
                    addToast(`لیست با ${finalItems.length} قلم کالا با موفقیت تولید شد.`, "success");

                } catch (e) {
                    console.error("Error generating pre-demand:", e);
                    addToast("خطا در تولید لیست پیش‌تقاضا.", "error");
                } finally {
                    setIsPreDemandLoading(false);
                }
            };

            const handlePreDemandItemQtyChange = (productId, newQty) => {
                setPreDemandItems(prev => prev.map(item => 
                    item.id === productId ? { ...item, suggestedQty: newQty } : item
                ));
            };

            const handleRemovePreDemandItem = (productId) => {
                setPreDemandItems(prev => prev.filter(item => item.id !== productId));
            };

            const exportPreDemandToWhatsAppSuppliers = () => {
                const customerName = customers.find(c => c.id === preDemandCustomerId)?.fullname || 'مشتری';
                let text = `سلام، لطفا قیمت بروز و موجودی اقلام زیر را اعلام فرمایید:\n\n`;
                preDemandItems.forEach((item, index) => {
                    if(item.suggestedQty > 0) {
                        text += `${index + 1}. ${item.product.brand?.title || ''} ${item.product.title}\n`;
                        text += `▫️ تعداد: ${item.suggestedQty}\n\n`;
                    }
                });
                text += `با تشکر`;
                navigator.clipboard.writeText(text);
                addToast("پیام استعلام تامین‌کنندگان کپی شد.", "success");
            };

            const exportPreDemandToWhatsAppCustomer = () => {
                const customerName = customers.find(c => c.id === preDemandCustomerId)?.fullname || 'مشتری';
                let text = `جناب/سرکار ${customerName} عزیز، سلام.\nبا توجه به بررسی سوابق مصرف شما، پیشنهاد خرید دوره‌ای زیر جهت بررسی و تامین به موقع تقدیم می‌گردد:\n\n`;
                preDemandItems.forEach((item, index) => {
                    if(item.suggestedQty > 0) {
                        text += `🔹 ${item.product.brand?.title || ''} ${item.product.title} (تعداد: ${item.suggestedQty})\n`;
                    }
                });
                text += `\nدر صورت تایید، لطفا اطلاع دهید تا تامین کالا انجام شود.`;
                navigator.clipboard.writeText(text);
                addToast("پیام پیشنهاد برای مشتری کپی شد.", "success");
            };

            const convertPreDemandToActualDemand = () => {
                if (preDemandItems.length === 0) return;
                const itemsToConvert = preDemandItems.filter(item => item.suggestedQty > 0);
                if (itemsToConvert.length === 0) {
                    addToast("حداقل تعداد یک کالا باید بیشتر از صفر باشد.", "error");
                    return;
                }
                
                setDemandModalInitialData({
                    customerId: preDemandCustomerId,
                    items: itemsToConvert
                });
                setIsModalOpen(true);
            };

            const customerOptions = customers.map(c => {
                const roleTag = c.role?.title && c.role.title !== 'Customer' ? ` [${c.role.title}]` : '';
                const displayName = formatProfileName(c);
                const displayTitle = `${displayName} (${c.mobile || 'بدون شماره'})${roleTag}`;
                return { id: c.id, title: displayTitle };
            });

            // Effect for countdown timer and auto-refresh
            React.useEffect(() => {
                const timer = setInterval(() => {
                    setCountdown(prevCountdown => {
                        if (prevCountdown <= 1) {
                            console.log("Auto-refreshing data...");
                            fetchDemands(statusFilterRef.current, true); // فقط تقاضاهای مربوط به فیلتر فعلی رفرش شود
                            return 300; 
                        }
                        return prevCountdown - 1; 
                    });
                }, 1000); 

                return () => clearInterval(timer);
            }, []); 
            
            const filteredDemands = React.useMemo(() => {
                return demands
                    .filter(demand => {
                        if (!searchTerm) return true;
                        const searchTermLower = searchTerm.toLowerCase();
                        const customerMatch = formatProfileName(demand.profiles).toLowerCase().includes(searchTermLower) || demand.profiles?.mobile?.includes(searchTermLower);

                        const productMatch = demand.demand_item.some(item => {
                            if (!item.product) return false;
                            const titleMatch = item.product.title?.toLowerCase().includes(searchTermLower);
                            const brandMatch = item.product.brand?.title?.toLowerCase().includes(searchTermLower);
                            const telegramCodeProp = item.product.productproperty?.find(
                                prop => prop.propertykey?.title?.toLowerCase().includes('تلگرام')
                            );
                            const telegramCode = telegramCodeProp ? telegramCodeProp.value : '';
                            const codeMatch = telegramCode?.toLowerCase().includes(searchTermLower);
                            return titleMatch || brandMatch || codeMatch;
                        });

                        const idMatch = String(demand.id).includes(searchTermLower);
                        return customerMatch || productMatch || idMatch;
                    })
                    .filter(demand => !emergencyFilter || demand.is_emergency === true)
                    .filter(demand => 
                        !awaitingCustomerFilter || 
                        demand.demand_item.some(item => item.demandstatustype?.title_farsi === "کالا تامین شد و منتظر تصمیم مشتری هست")
                    );
            }, [demands, searchTerm, emergencyFilter, awaitingCustomerFilter]);

            // Filter logic for Retargeting
            const filteredRetargetingItems = React.useMemo(() => {
                return retargetingItems.filter(item => {
                    // Search Logic
                    const searchLower = retargetingSearchTerm.toLowerCase();
                    const matchesSearch = !retargetingSearchTerm || 
                        item.product?.title?.toLowerCase().includes(searchLower) ||
                        item.product?.brand?.title?.toLowerCase().includes(searchLower) ||
                        formatProfileName(item.customer).toLowerCase().includes(searchLower) ||
                        item.customer?.mobile?.includes(searchLower);

                    // Time Filter Logic (Stock)
                    if (!matchesSearch) return false;
                    
                    if (retargetingTimeFilter === '7days') {
                        const sevenDaysAgo = new Date();
                        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                        // Check if ANY supplier has updated in the last 7 days
                        const hasRecentStock = item.availableSuppliers.some(s => new Date(s.lastupdatedat) >= sevenDaysAgo);
                        if (!hasRecentStock) return false;
                    }

                    // --- NEW: Time Filter Logic (Cancellation/Demand Date) ---
                    if (retargetingCancellationFilter !== 'all') {
                        const days = parseInt(retargetingCancellationFilter);
                        if (!isNaN(days)) {
                            const cutoffDate = new Date();
                            cutoffDate.setDate(cutoffDate.getDate() - days);
                            // We use item.demandDate (which is technically creation date here) as proxy
                            if (new Date(item.demandDate) < cutoffDate) return false;
                        }
                    }
                    
                    return true;
                });
            }, [retargetingItems, retargetingSearchTerm, retargetingTimeFilter, retargetingCancellationFilter]);

            const handleDeleteDemand = (demandId) => {
                setConfirmState({
                    isOpen: true,
                    title: 'حذف تقاضا',
                    message: `آیا از حذف کامل تقاضا با شناسه ${demandId} و تمام اقلام آن اطمینان دارید؟ این عمل غیرقابل بازگشت است.`,
                    onConfirm: async () => {
                        try {
                            setConfirmState({ isOpen: false });
                            const itemIds = demands.find(d => d.id === demandId)?.demand_item.map(i => i.id) || [];
                            if(itemIds.length > 0) {
                                // Also delete from supplier_demand_assignment
                                await supabaseClient.from('supplier_demand_assignment').delete().in('demand_item_id', itemIds);
                                await supabaseClient.from('demandstatuslog').delete().in('demand_item_id', itemIds);
                                // Optional: Delete demand_item_log entries as well if used
                            }
                            await supabaseClient.from('demand_item').delete().eq('demandid', demandId);
                            await supabaseClient.from('demand').delete().eq('id', demandId);
                            fetchDemands(statusFilter, true); 
                            addToast('تقاضا با موفقیت حذف شد.');
                        } catch (err) {
                            console.error("Error deleting demand:", err);
                            setError(`خطا در حذف تقاضا: ${err.message}`);
                            addToast('خطا در حذف تقاضا', 'error');
                        }
                    }
                });
            };

            const handleReissueDemand = (item) => {
                setConfirmState({
                    isOpen: true,
                    title: 'صدور مجدد تقاضا',
                    message: `آیا از صدور تقاضای جدید برای مشتری ${item.customer?.fullname} جهت محصول ${item.product?.title} اطمینان دارید؟`,
                    onConfirm: async () => {
                        setIsRetargetingLoading(true);
                        setConfirmState({ isOpen: false, onConfirm: null, message: '', title: '' }); // Close modal immediately
                        try {
                            // 1. Create new Demand Header
                            const { data: newDemand, error: demandError } = await supabaseClient
                                .from('demand')
                                .insert({
                                    customeruserid: item.customer.id,
                                    locationid: item.location?.id || null, // Reuse location if available
                                    is_emergency: false, // Default to normal unless specified otherwise
                                })
                                .select()
                                .single();

                            if (demandError) throw demandError;

                            // 2. Create new Demand Item
                            const { data: newItem, error: itemError } = await supabaseClient
                                .from('demand_item')
                                .insert({
                                    demandid: newDemand.id,
                                    productid: item.productid,
                                    quantity: item.quantity, // Use original quantity
                                    demand_admin_note: `Retargeted from cancelled item ID: ${item.id}`, // Add note linking back
                                    demandstatusid: defaultStatusId // Use the default open status
                                })
                                .select()
                                .single();

                            if (itemError) throw itemError;

                            // 3. Log status
                            await supabaseClient
                                .from('demandstatuslog')
                                .insert({
                                    demand_item_id: newItem.id,
                                    demandstatusid: defaultStatusId
                                });

                            // 4. Update old item to mark as retargeted so it disappears from the list
                            const { error: updateOldError } = await supabaseClient
                                .from('demand_item')
                                .update({ 
                                    demand_admin_note: (item.demand_admin_note ? item.demand_admin_note + ' ' : '') + '[Retargeted]' 
                                })
                                .eq('id', item.id);

                            if (updateOldError) {
                                console.error("Error updating old item:", updateOldError);
                            }

                            addToast('تقاضای جدید با موفقیت صادر شد', 'success');
                            fetchDemands(statusFilter, true); // Refresh demands list in background
                            fetchRetargetingData(); // Refresh retargeting list immediately
                            
                        } catch (err) {
                            console.error("Error reissuing demand:", err);
                            addToast(`خطا در صدور مجدد: ${err.message}`, 'error');
                        } finally {
                            setIsRetargetingLoading(false);
                        }
                    }
                });
            };

            const handleOpenModal = () => setIsModalOpen(true);
            const handleCloseModal = () => setIsModalOpen(false);
            const handleSaveDemand = () => { fetchDemands(statusFilter, true); handleCloseModal(); addToast('تقاضای جدید با موفقیت ثبت شد.') };
            
            const handleOpenEditItemModal = (item, demand) => { setEditingItem(item); setEditingDemand(demand); setIsEditItemModalOpen(true); };
            const handleCloseEditItemModal = () => { setEditingItem(null); setEditingDemand(null); setIsEditItemModalOpen(false); };
            const handleSaveItem = () => { fetchDemands(statusFilter, true); handleCloseEditItemModal(); addToast('آیتم با موفقیت به‌روزرسانی شد.'); };

            const handleCloseManageItemsModal = () => { setDemandToManage(null); setIsManageItemsModalOpen(false); };

            const scrollToBottom = () => {

                return demandStatuses.reduce((acc, status) => {

            const formatCountdown = (seconds) => {

                                )}
                                <span>ثبت تقاضای جدید</span>

                        <button

                            onClick={() => setActiveTab('predemand')}
                        >

                            آفر و پیش‌تقاضا
                        </button>
                    </div>

                    {/* Content for Active Demands */}
                    {activeTab === 'demands' && (
                        <>
                            <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow mb-6">

                                                    </svg>

                                            <tbody className="divide-y divide-gray-100 dark:divide-gray-700/50">
                                                {preDemandItems.map((item) => (
                                                    <tr key={item.id} className="hover:bg-gray-50/50 dark:hover:bg-gray-700/20 transition-colors">
                                                        <td className="p-4 font-medium text-gray-800 dark:text-gray-200">
                                                            <div className="flex items-center gap-3">
                                                                {item.product?.image_url ? (
                                                                    <img src={item.product.image_url} loading="lazy" className="w-16 h-16 rounded-md object-cover border border-gray-200 dark:border-gray-600 shadow-sm hover:scale-150 transition-transform duration-300 relative z-10 hover:z-50" />
                                                                ) : (
                                                                     <div className="w-16 h-16 rounded-md bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-xs text-gray-400">بدون عکس</div>
                                                                )}
                                                                <span>{item.product?.brand?.title} {item.product?.title}</span>
                                                            </div>
                                                        </td>
                                                        <td className="p-4 text-center font-mono text-gray-500 dark:text-gray-400">
                                                            {item.totalHistoryQty}
                                                        </td>
                                                        <td className="p-4 text-center font-mono text-gray-500 dark:text-gray-400">
                                                            {item.monthlyAvg}
                                                        </td>
                                                        <td className="p-4">
                                                            <input 
                                                                type="number" 
                                                                value={item.suggestedQty} 
                                                                onChange={(e) => handlePreDemandItemQtyChange(item.id, e.target.value)}
                                                                className="w-full text-center p-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-indigo-500 font-mono font-bold"
                                                                min="0"
                                                            />
                                                        </td>
                                                        <td className="p-4 text-xs font-mono text-gray-500 dark:text-gray-400 leading-relaxed">
                                                            {item.marketPrices}
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <button 
                                                                onClick={() => handleRemovePreDemandItem(item.id)} 
                                                                className="text-red-400 hover:text-red-600 dark:hover:text-red-400 p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 transition"
                                                                title="حذف از لیست"
                                                            >
                                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v6a1 1 0 11-2 0V8z" clipRule="evenodd" /></svg>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    
                                    {/* Action Bottom Bar */}
                                    <div className="p-4 border-t border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/30 flex flex-col md:flex-row justify-between items-center gap-4">
                                        <div className="flex flex-wrap gap-2 w-full md:w-auto">
                                            <button 
                                                onClick={exportPreDemandToWhatsAppSuppliers}
                                                className="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-sm font-medium transition shadow-sm"
                                            >
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-green-500" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" /><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" /></svg>
                                                کپی استعلام تامین‌کننده
                                            </button>
                                            <button 
                                                onClick={exportPreDemandToWhatsAppCustomer}
                                                className="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-sm font-medium transition shadow-sm"
                                            >
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-blue-500" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clipRule="evenodd" /></svg>
                                                کپی آفر مشتری
                                            </button>
                                        </div>
                                        
                                        <button 
                                            onClick={convertPreDemandToActualDemand}
                                            className="w-full md:w-auto px-6 py-2.5 bg-green-600 hover:bg-green-700 text-white rounded-lg font-bold flex items-center justify-center gap-2 transition shadow shadow-green-600/30"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>
                                            تبدیل به تقاضای رسمی
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {isModalOpen && <DemandFormModal isOpen={isModalOpen} onClose={handleCloseModal} onSave={handleSaveDemand} customers={customers} products={products} defaultStatusId={defaultStatusId} onCustomerCreated={(newCustomer) => { setCustomers(prev => [...prev, newCustomer].sort((a,b) => a.fullname.localeCompare(b.fullname))); }} customerRoleId={customerRoleId} marketingChannels={marketingChannels} provinces={provinces} initialData={demandModalInitialData} isProductsLoading={isProductsLoading} />}
                    {isEditItemModalOpen && <EditDemandItemModal isOpen={isEditItemModalOpen} onClose={handleCloseEditItemModal} onSave={handleSaveItem} onRefresh={fetchDemands} itemToEdit={editingItem} demand={editingDemand} demandStatuses={demandStatuses} groupedStatuses={groupedStatuses} allProfiles={customers} />}
                    {isManageItemsModalOpen && <ManageDemandItemsModal isOpen={isManageItemsModalOpen} onClose={handleCloseManageItemsModal} onSave={handleSaveManagedItems} demandToEdit={demandToManage} products={products} defaultStatusId={defaultStatusId} isProductsLoading={isProductsLoading} />}
                    <ConfirmModal isOpen={confirmState.isOpen} onClose={() => setConfirmState({ isOpen: false, onConfirm: null, message: '', title: '' })} onConfirm={confirmState.onConfirm} title={confirmState.title} message={confirmState.message} />
                    
                    {/* Floating Scroll Buttons */}
                    <div className="fixed bottom-6 right-6 z-[90] flex flex-col gap-3">
                        <button onClick={scrollToTop} className="bg-gray-800/40 hover:bg-gray-800 dark:bg-gray-700/40 dark:hover:bg-gray-700 text-white p-2.5 rounded-full backdrop-blur-md transition-all shadow-lg flex items-center justify-center" title="برگشت به بالا">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 15l7-7 7 7" /></svg>
                        </button>
                        <button onClick={scrollToBottom} className="bg-gray-800/40 hover:bg-gray-800 dark:bg-gray-700/40 dark:hover:bg-gray-700 text-white p-2.5 rounded-full backdrop-blur-md transition-all shadow-lg flex items-center justify-center" title="رفتن به پایین">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                        </button>
                    </div>
                </div>
            );
        };
        
        const App = () => {
             const [theme, setTheme] = React.useState('light');
             React.useEffect(() => {
                  // Sync theme state with the document's class for Tailwind
                  document.documentElement.className = theme;
             }, [theme]);

             const toggleTheme = () => {
                  setTheme(prev => prev === 'light' ? 'dark' : 'light');
             };

             return (
                 <ToastProvider>
                     <DemandManagement theme={theme} toggleTheme={toggleTheme} />
                 </ToastProvider>
             );
         }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
