<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standalone Demand Management</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        vazir: ['Vazirmatn', 'sans-serif'],
                    },
                     keyframes: {
                        'toast-in': {
                          'from': { transform: 'translateX(100%)', opacity: '0' },
                          'to': { transform: 'translateX(0)', opacity: '1' },
                        },
                      },
                      animation: {
                        'toast-in': 'toast-in 0.5s ease-out forwards',
                      }
                },
            },
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jalaali-js/dist/jalaali.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
            scroll-behavior: smooth;
        }
        .dark body {
            background-color: #111827; /* dark:bg-gray-900 */
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            padding: 1.5rem;
            border-radius: 0.5rem;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #4f46e5; /* indigo-600 */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 3rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==================================================
        // Supabase Client Setup
        // ==================================================
        // Access supabase from window object to avoid ReferenceError
        const { createClient } = window.supabase;

        // Note: The Supabase variables __supabase_url and __supabase_anon_key are expected to be available globally in the execution environment.
        const supabaseUrl = typeof __supabase_url !== 'undefined' ? __supabase_url : 'https://wehyjatotbzxargnxasg.supabase.co';
        const supabaseKey = typeof __supabase_anon_key !== 'undefined' ? __supabase_anon_key : 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlaHlqYXRvdGJ6eGFyZ254YXNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE5MTIwMjEsImV4cCI6MjA2NzQ4ODAyMX0.2R448DuEBlTrNvaYXiYZ8D5M7MJNv7n1qmIDHQBNFiY';

        const supabaseClient = createClient(supabaseUrl, supabaseKey);


        // ==================================================
        // Helper Functions & UI Components
        // ==================================================
        const formatCurrency = (value) => {
            if (value === null || typeof value === 'undefined' || isNaN(value)) return '-';
            return `${Number(value).toLocaleString('fa-IR')} تومان`;
        };

        const formatSafeNumber = (val) => {
            if (!val) return '۰';
            // Remove commas or other non-numeric chars if stored as text
            const cleanVal = String(val).replace(/,/g, '');
            const num = Number(cleanVal);
            return isNaN(num) ? 'خطا' : num.toLocaleString('fa-IR');
        };
        
        const formatDateTime = (dateString, includeTime = true) => {
            if (!dateString) return '-';
            try {
                const date = new Date(dateString);
                if (isNaN(date)) return '-';
                if (!window.jalaali || !window.jalaali.toJalaali) { 
                    // Fallback to standard date if jalaali-js is unavailable
                    return date.toLocaleString('en-CA');
                }
                const jDate = window.jalaali.toJalaali(date);
                const year = jDate.jy;
                const month = String(jDate.jm).padStart(2, '0');
                const day = String(jDate.jd).padStart(2, '0');
                if (!includeTime) return `${year}/${month}/${day}`;
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                return `${year}/${month}/${day} ${hours}:${minutes}`;
            } catch (e) {
                console.error("Error formatting datetime:", e);
                return dateString;
            }
        };

        const timeAgo = (dateString) => {
            if (!dateString) return '';
            const diff = new Date() - new Date(dateString);
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days === 0) return 'امروز';
            if (days === 1) return 'دیروز';
            return `${days} روز پیش`;
        };

        const formatProfileName = (profile) => {
            if (!profile) return 'نامشخص';
            const fname = profile.firstname || '';
            const lname = profile.fullname || '';
            if (fname && lname) return `${fname} ${lname}`;
            return fname || lname || 'کاربر بدون نام';
        };

        const Modal = ({ isOpen, onClose, title, children, zIndex }) => {
            if (!isOpen) return null;
            React.useEffect(() => {
                document.body.style.overflow = 'hidden';
                return () => { document.body.style.overflow = 'unset'; };
            }, [isOpen]);
            return (
                <div className="modal-overlay" style={{ zIndex: zIndex || 100 }} onClick={onClose}>
                    <div className="modal-content bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4 pb-3 border-b border-gray-200 dark:border-gray-600">
                            <h2 className="text-xl font-bold">{title}</h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-800 dark:hover:text-white text-2xl">&times;</button>
                        </div>
                        {children}
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, onClose, onConfirm, title, message }) => {
            if (!isOpen) return null;
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={title} zIndex={120}>
                    <p className="text-gray-600 dark:text-gray-300 mb-6">{message}</p>
                    <div className="flex flex-col sm:flex-row justify-end gap-3">
                        <button type="button" onClick={onClose} className="w-full sm:w-auto bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-700 text-gray-800 dark:text-white font-bold py-2 px-4 rounded-lg">لغو</button>
                        <button type="button" onClick={onConfirm} className="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg">تایید</button>
                    </div>
                </Modal>
            );
        };
        
        const SearchableSelect = ({ options, value, onChange, placeholder, disabled = false }) => {
            const [searchTerm, setSearchTerm] = React.useState('');
            const [isOpen, setIsOpen] = React.useState(false);
            const wrapperRef = React.useRef(null);

            const selectedOption = React.useMemo(() => options.find(opt => opt.id === value), [options, value]);

            const filteredOptions = React.useMemo(() => {
                if (!searchTerm) return options;
                const lowerSearchTerm = searchTerm.toLowerCase();
                return options.filter(opt =>
                    opt.title.toLowerCase().includes(lowerSearchTerm)
                );
            }, [options, searchTerm]);

            // بهینه‌سازی: محدود کردن تعداد آیتم‌های نمایشی به 30 مورد برای جلوگیری از فریز شدن صفحه در رندر 10,000 گره DOM
            const displayOptions = filteredOptions.slice(0, 30);

            React.useEffect(() => {
                function handleClickOutside(event) {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                        setSearchTerm('');
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [wrapperRef]);

            const handleSelect = (option) => {
                onChange(option.id);
                setSearchTerm('');
                setIsOpen(false);
            };

            return (
                <div className="relative" ref={wrapperRef}>
                    <input
                        type="text"
                        placeholder={selectedOption ? selectedOption.title : placeholder}
                        value={searchTerm}
                        onChange={e => setSearchTerm(e.target.value)}
                        onFocus={() => setIsOpen(true)}
                        disabled={disabled}
                        className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm disabled:opacity-60"
                    />
                    {isOpen && !disabled && (
                        <div className="absolute z-10 w-full mt-1 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg shadow-lg max-h-60 overflow-y-auto">
                            {displayOptions.length > 0 ? (
                                <>
                                    {displayOptions.map(option => (
                                        <div
                                            key={option.id}
                                            onClick={() => handleSelect(option)}
                                            className="p-2 hover:bg-indigo-50 dark:hover:bg-indigo-900/40 cursor-pointer flex items-center gap-3 border-b border-gray-50 dark:border-gray-700/50 last:border-0"
                                        >
                                            {/* نمایش و لود تنبل تصویر در جستجو */}
                                            {option.image !== undefined && (
                                                option.image ? (
                                                    <img src={option.image} alt={option.title} loading="lazy" className="w-12 h-12 rounded object-cover border border-gray-200 dark:border-gray-600 bg-white" />
                                                ) : (
                                                    <div className="w-12 h-12 rounded bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-[10px] text-gray-400 border border-gray-200 dark:border-gray-600">بدون عکس</div>
                                                )
                                            )}
                                            <div className="flex-1 text-sm">{option.title}</div>
                                        </div>
                                    ))}
                                    {filteredOptions.length > 30 && (
                                        <div className="p-2 text-xs text-center text-gray-500 bg-gray-50 dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700">
                                            نتایج بیشتر پنهان شدند. لطفا دقیق‌تر جستجو کنید.
                                        </div>
                                    )}
                                </>
                            ) : (
                                <div className="p-3 text-sm text-gray-500 text-center">موردی یافت نشد.</div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const QuickUserFormModal = ({ isOpen, onClose, onSuccess, customerRoleId, marketingChannels, provinces }) => {
            const [formData, setFormData] = React.useState({ mobile: '', prefix: '', firstname: '', fullname: '', emergencyphonenumber: '', marketingchannelid: '', provinceid: '', cityid: '' });
            const [cities, setCities] = React.useState([]);
            const [isLoadingCities, setIsLoadingCities] = React.useState(false);
            const [isLoading, setIsLoading] = React.useState(false);
            const [error, setError] = React.useState('');

            React.useEffect(() => {
                const fetchCities = async () => {
                    if (formData.provinceid) {
                        setIsLoadingCities(true);
                        const { data } = await supabaseClient.from('city').select('*').eq('provinceid', formData.provinceid).order('title');
                        setCities(data || []);
                        setIsLoadingCities(false);
                    } else {
                        setCities([]);
                    }
                };
                fetchCities();
            }, [formData.provinceid]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);
                try {
                    const password = formData.mobile.slice(-6);
                    if (password.length < 6) throw new Error('شماره موبایل باید معتبر باشد (حداقل ۶ رقم).');
                    
                    // بررسی اینکه آیا شماره موبایل از قبل در سیستم وجود دارد یا خیر (جلوگیری از ایجاد کاربر تکراری)
                    const { data: existingProfiles, error: searchError } = await supabaseClient
                        .from('profiles')
                        .select('fullname, role:roleid(title)')
                        .eq('mobile', formData.mobile);
                        
                    if (searchError) throw new Error('خطا در بررسی شماره موبایل.');
                    if (existingProfiles && existingProfiles.length > 0) {
                        const existing = existingProfiles[0];
                        const roleName = existing.role?.title || 'نامشخص';
                        throw new Error(`این شماره موبایل قبلاً برای کاربر "${existing.fullname}" با نقش "${roleName}" ثبت شده است. لطفاً او را مستقیماً از منوی جستجو انتخاب کنید.`);
                    }

                    const email = `${formData.mobile}@placeholder.email`;
                    
                    const { data: authData, error: authError } = await supabaseClient.auth.signUp({ email, password });
                    if (authError) throw new Error(authError.message.includes("User already registered") ? "کاربری با این شماره موبایل قبلا ثبت‌نام کرده است." : "خطا در ایجاد کاربر.");
                    
                    if (authData.user) {
                        const profileData = {
                            fullname: formData.fullname,
                            firstname: formData.firstname || null,
                            prefix: formData.prefix || null,
                            mobile: formData.mobile,
                            emergencyphonenumber: formData.emergencyphonenumber || null,
                            roleid: customerRoleId,
                            marketingchannelid: formData.marketingchannelid || null,
                        };
                        const { error: profileError } = await supabaseClient.from('profiles').update(profileData).eq('id', authData.user.id);
                        if (profileError) throw profileError;

                        if (formData.cityid || formData.provinceid) {
                            const { data: locData, error: locError } = await supabaseClient.from('location').insert({
                                title: `آدرس پایه ${formData.fullname}`,
                                provinceid: formData.provinceid || null,
                                cityid: formData.cityid || null
                            }).select().single();
                            if (!locError && locData) {
                                await supabaseClient.from('userlocation').insert({ userid: authData.user.id, locationid: locData.id });
                            }
                        }
                        onSuccess({ id: authData.user.id, fullname: formData.fullname, firstname: formData.firstname, mobile: formData.mobile });
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="ثبت سریع مشتری جدید" zIndex={110}>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-medium mb-1">شماره موبایل *</label>
                                <input type="tel" name="mobile" required value={formData.mobile} onChange={handleChange} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="09..." />
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">شماره موبایل دوم</label>
                                <input type="tel" name="emergencyphonenumber" value={formData.emergencyphonenumber} onChange={handleChange} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">عنوان</label>
                                <select name="prefix" value={formData.prefix} onChange={handleChange} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                    <option value="">انتخاب...</option>
                                    <option value="Mr">جناب</option>
                                    <option value="Mrs">بانو</option>
                                    <option value="Company">شرکت</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">نام کوچک</label>
                                <input type="text" name="firstname" value={formData.firstname} onChange={handleChange} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500" />
                            </div>
                            <div className="md:col-span-2">
                                <label className="block text-sm font-medium mb-1">نام کامل *</label>
                                <input type="text" name="fullname" required value={formData.fullname} onChange={handleChange} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500" />
                            </div>
                            <div className="md:col-span-2 border-t border-gray-200 dark:border-gray-700 pt-3">
                                <h4 className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-3">اطلاعات تکمیلی (اختیاری)</h4>
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">کانال جذب</label>
                                <select name="marketingchannelid" value={formData.marketingchannelid} onChange={handleChange} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                    <option value="">انتخاب کانال...</option>
                                    <option value="">کانال نامشخص</option>
                                    {marketingChannels.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}
                                </select>
                            </div>
                            <div></div> {/* Empty div to align locations on next line */}
                            <div>
                                <label className="block text-sm font-medium mb-1">استان</label>
                                <select name="provinceid" value={formData.provinceid} onChange={(e) => { handleChange(e); setFormData(p => ({...p, cityid: ''})); }} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                    <option value="">انتخاب استان...</option>
                                    {provinces.map(p => <option key={p.id} value={p.id}>{p.title}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1 flex justify-between">
                                    <span>شهر</span>
                                    {isLoadingCities && <span className="text-xs text-indigo-500">در حال بارگذاری...</span>}
                                </label>
                                <select name="cityid" value={formData.cityid} onChange={handleChange} disabled={!formData.provinceid || isLoadingCities} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500 disabled:opacity-50">
                                    <option value="">انتخاب شهر...</option>
                                    {cities.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}
                                </select>
                            </div>
                        </div>
                        {error && <p className="text-red-500 text-sm mt-2">{error}</p>}
                        <div className="flex justify-end gap-4 pt-4 border-t border-gray-200 dark:border-gray-700 mt-4">
                            <button type="button" onClick={onClose} className="bg-gray-200 dark:bg-gray-600 py-2 px-5 rounded-lg">انصراف</button>
                            <button type="submit" disabled={isLoading} className="bg-green-600 hover:bg-green-700 text-white py-2 px-5 rounded-lg flex items-center gap-2 transition">
                                {isLoading ? <span className="spinner w-4 h-4 border-white"></span> : null}
                                ثبت مشتری
                            </button>
                        </div>
                    </form>
                </Modal>
            );
        };

        const DemandFormModal = ({ isOpen, onClose, onSave, customers, products, defaultStatusId, onCustomerCreated, customerRoleId, marketingChannels, provinces, initialData, isProductsLoading }) => {
            const [customerId, setCustomerId] = React.useState('');
            const [deadline, setDeadline] = React.useState('');
            const [isEmergency, setIsEmergency] = React.useState(false);
            const [items, setItems] = React.useState([{ productid: '', quantity: '', demand_admin_note: '', supply_admin_note: '', key: crypto.randomUUID() }]);
            const [error, setError] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);
            const [supplierPrices, setSupplierPrices] = React.useState({});
            const [isQuickUserOpen, setIsQuickUserOpen] = React.useState(false);

            const [customerLocations, setCustomerLocations] = React.useState([]);
            const [locationId, setLocationId] = React.useState('');
            const [isFetchingLocations, setIsFetchingLocations] = React.useState(false);

            // --- NEW: Load initial data if provided (from Pre-Demand) ---
            React.useEffect(() => {
                if (initialData && isOpen) {
                    setCustomerId(initialData.customerId || '');
                    if (initialData.items && initialData.items.length > 0) {
                        setItems(initialData.items.map(item => ({
                            productid: item.id,
                            quantity: item.suggestedQty || '',
                            demand_admin_note: '',
                            supply_admin_note: '',
                            key: crypto.randomUUID()
                        })));
                    }
                } else if (isOpen) {
                    // Reset if opened normally
                    setCustomerId('');
                    setItems([{ productid: '', quantity: '', demand_admin_note: '', supply_admin_note: '', key: crypto.randomUUID() }]);
                    setDeadline('');
                    setIsEmergency(false);
                }
            }, [initialData, isOpen]);

            React.useEffect(() => {
                const fetchLocations = async () => {
                    if (!customerId) {
                        setCustomerLocations([]);
                        setLocationId('');
                        return;
                    }
                    setIsFetchingLocations(true);
                    const { data, error } = await supabaseClient
                        .from('userlocation')
                        .select('location(*, city(*, province(*)))')
                        .eq('userid', customerId);
                    
                    if (error) {
                        console.error("Error fetching customer locations:", error);
                        setError("خطا در دریافت آدرس‌های مشتری.");
                    } else {
                        setCustomerLocations(data.map(ul => ul.location).filter(loc => loc)); // Filter out potential null locations
                        if (data.length === 1 && data[0].location) {
                            setLocationId(data[0].location.id);
                        } else {
                            setLocationId('');
                        }
                    }
                    setIsFetchingLocations(false);
                };

                fetchLocations();
            }, [customerId]);

            const handleAddItem = () => {
                setItems([...items, { productid: '', quantity: '', demand_admin_note: '', supply_admin_note: '', key: crypto.randomUUID() }]);
            };

            const handleItemChange = async (index, field, value) => {
                const newItems = [...items];
                newItems[index][field] = value;
                setItems(newItems);

                if (field === 'productid' && value) {
                    // Fetch supplier prices for the selected product
                    const { data, error } = await supabaseClient
                        .from('supplierstock')
                        .select('unitprice, profiles:supplieruserid (fullname)')
                        .eq('productid', value);
                    
                    if (error) {
                        console.error("Error fetching supplier prices:", error);
                    } else {
                        setSupplierPrices(prev => ({...prev, [value]: data}));
                    }
                }
            };

            const handleRemoveItem = (index) => {
                setItems(items.filter((_, i) => i !== index));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!customerId || items.length === 0 || items.some(i => !i.productid || !i.quantity)) {
                    setError('لطفا مشتری را انتخاب کرده و حداقل یک کالا با تعداد مشخص اضافه کنید.');
                    return;
                }
                if (customerLocations.length > 0 && !locationId) {
                    setError('لطفا آدرس تحویل مشتری را انتخاب کنید.');
                    return;
                }
                
                setIsLoading(true);
                setError('');

                try {
                    // Step 1: Create the demand header
                    const { data: demandData, error: demandError } = await supabaseClient
                        .from('demand')
                        .insert({
                            customeruserid: customerId,
                            deadlinedate: deadline || null,
                            locationid: locationId || null,
                            is_emergency: isEmergency,
                        })
                        .select()
                        .single();

                    if (demandError) throw demandError;

                    // Step 2: Prepare and insert the demand items with default status
                    const demandItems = items.map(item => ({
                        demandid: demandData.id,
                        productid: item.productid,
                        quantity: Number(item.quantity),
                        demand_admin_note: item.demand_admin_note,
                        supply_admin_note: item.supply_admin_note,
                        demandstatusid: defaultStatusId 
                    }));

                    const { data: insertedItems, error: itemsError } = await supabaseClient
                        .from('demand_item')
                        .insert(demandItems)
                        .select();

                    if (itemsError) throw itemsError;

                    // Step 3: Log the initial status for each newly created item
                    const logsToInsert = insertedItems.map(item => ({
                        demand_item_id: item.id,
                        demandstatusid: defaultStatusId
                    }));

                    if (logsToInsert.length > 0) {
                        const { error: logError } = await supabaseClient
                            .from('demandstatuslog')
                            .insert(logsToInsert);

                        if (logError) {
                            console.error("Error logging initial status:", logError);
                        }
                    }

                    onSave();
                } catch (err) {
                    console.error("Error creating demand:", err);
                    setError(`خطا در ثبت تقاضا: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            };
            
            const customerOptions = customers.map(c => {
                // نمایش تگ نقش در صورتی که کاربر چیزی غیر از مشتری عادی باشد
                const roleTag = c.role?.title && c.role.title !== 'Customer' ? ` [${c.role.title}]` : '';
                const displayName = formatProfileName(c);
                const displayTitle = `${displayName} (${c.mobile || 'بدون شماره'})${roleTag}`;
                return { id: c.id, title: displayTitle };
            });
            
            const productOptions = products.map(p => {
                const telegramCodeProp = p.productproperty?.find(
                    prop => prop.propertykey?.title?.toLowerCase().includes('تلگرام')
                );
                const telegramCode = telegramCodeProp ? telegramCodeProp.value : '';
                const displayTitle = `(ID: ${p.id}) ${telegramCode ? `[${telegramCode}] ` : ''}${p.brand ? p.brand.title + ' ' : ''}${p.title}`;
                // ارسال تصویر به Select
                return { id: p.id, title: displayTitle, image: p.image_url };
            });

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="ثبت تقاضای جدید">
                    <form onSubmit={handleSubmit} className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 items-center">
                            <div className="flex items-end gap-2">
                                <div className="flex-grow">
                                    <label className="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">مشتری</label>
                                    <SearchableSelect options={customerOptions} value={customerId} onChange={setCustomerId} placeholder="جستجوی نام یا شماره مشتری..." />
                                </div>
                                <button type="button" onClick={() => setIsQuickUserOpen(true)} className="bg-green-500 hover:bg-green-600 text-white rounded-lg px-3 py-2 h-[42px] mb-[0px] transition flex items-center justify-center shadow-sm" title="افزودن مشتری جدید سریع">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clipRule="evenodd" /></svg>
                                </button>
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">مهلت تحویل (اختیاری)</label>
                                <input type="date" value={deadline} onChange={e => setDeadline(e.target.value)} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg text-sm" />
                            </div>
                        </div>
                        
                        <div className="flex items-center">
                            <input type="checkbox" id="is_emergency" checked={isEmergency} onChange={(e) => setIsEmergency(e.target.checked)} className="ml-2 h-4 w-4 rounded text-red-600 border-red-300 focus:ring-red-500" />
                            <label htmlFor="is_emergency" className="text-sm font-medium">تقاضای فوری</label>
                        </div>

                        {isFetchingLocations && <p className="text-sm text-gray-500">در حال بارگذاری آدرس‌ها...</p>}
                        {customerId && !isFetchingLocations && customerLocations.length > 0 && (
                             <div>
                                <label className="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">آدرس تحویل</label>
                                <select value={locationId} onChange={e => setLocationId(e.target.value)} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg text-sm" required>
                                    <option value="" disabled>یک آدرس را انتخاب کنید...</option>
                                    {customerLocations.map(loc => {
                                        const fullAddress = `${loc.city?.province?.title || ''}, ${loc.city?.title || ''}, ${loc.address || ''}`;
                                        return <option key={loc.id} value={loc.id}>{fullAddress}</option>
                                    })}
                                </select>
                            </div>
                        )}
                        {customerId && !isFetchingLocations && customerLocations.length === 0 && (
                            <p className="text-sm text-yellow-500 bg-yellow-100 dark:bg-yellow-900/50 p-2 rounded-md">
                                این مشتری آدرسی ثبت نکرده است. تقاضا بدون آدرس ثبت خواهد شد.
                            </p>
                        )}

                        <div className="border-t border-gray-200 dark:border-gray-700 pt-4">
                            <h3 className="text-lg font-semibold mb-2 flex items-center gap-2">
                                اقلام درخواستی 
                                {isProductsLoading && <span className="text-xs font-normal text-indigo-500 bg-indigo-50 dark:bg-indigo-900/40 px-2 py-0.5 rounded-full flex items-center gap-1"><span className="spinner w-3 h-3 border-[1.5px] border-indigo-500 m-0"></span> در حال دریافت اطلاعات محصولات...</span>}
                            </h3>
                            <div className="space-y-3">
                                {items.map((item, index) => {
                                    const prices = supplierPrices[item.productid] || [];
                                    const selectedProduct = products.find(p => p.id === item.productid);
                                    let productProperties = [];
                                    if (selectedProduct && selectedProduct.productproperty) {
                                        productProperties = selectedProduct.productproperty
                                            .filter(prop => prop.propertykey && prop.value)
                                            .map(prop => ({ title: prop.propertykey.title, value: prop.value }));
                                    }
                                    return (
                                        <div key={item.key} className="p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg border border-gray-100 dark:border-gray-700">
                                            <div className="grid grid-cols-1 md:grid-cols-5 items-end gap-x-4 gap-y-3">
                                                <div className="md:col-span-3 flex gap-3 items-end">
                                                    {/* نمایش عکس کالا کنار سلکتور با لود تنبل و سایز بزرگتر */}
                                                    {selectedProduct && (
                                                        selectedProduct.image_url ? (
                                                            <img src={selectedProduct.image_url} alt="" loading="lazy" className="w-16 h-16 rounded-lg object-cover border border-gray-300 dark:border-gray-600 shadow-sm" />
                                                        ) : (
                                                            <div className="w-16 h-16 rounded-lg bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 flex items-center justify-center text-xs text-gray-400 shadow-sm">بدون عکس</div>
                                                        )
                                                    )}
                                                    <div className="flex-1">
                                                        <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">محصول</label>
                                                        <SearchableSelect 
                                                            options={productOptions} 
                                                            value={item.productid} 
                                                            onChange={(id) => handleItemChange(index, 'productid', id)} 
                                                            placeholder={isProductsLoading ? "درحال بارگذاری لیست محصولات..." : "جستجوی محصول با نام یا کد..."}
                                                            disabled={isProductsLoading}
                                                        />
                                                    </div>
                                                </div>
                                                <div className="md:col-span-1">
                                                    <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">تعداد</label>
                                                    <input type="number" value={item.quantity} onChange={(e) => handleItemChange(index, 'quantity', e.target.value)} className="w-full bg-white dark:bg-gray-600 p-2 rounded-lg text-sm border border-transparent focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="تعداد" min="1" required />
                                                </div>
                                                <div className="flex justify-end"><button type="button" onClick={() => handleRemoveItem(index)} className="text-red-500 hover:text-red-700 p-2 mb-1">✕</button></div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                                                <textarea value={item.demand_admin_note} onChange={(e) => handleItemChange(index, 'demand_admin_note', e.target.value)} placeholder="یادداشت مدیر تقاضا..." className="w-full text-sm bg-white dark:bg-gray-600 p-2 rounded-lg border border-transparent focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500" rows="2"></textarea>
                                                <textarea value={item.supply_admin_note} onChange={(e) => handleItemChange(index, 'supply_admin_note', e.target.value)} placeholder="یادداشت مدیر تامین..." className="w-full text-sm bg-white dark:bg-gray-600 p-2 rounded-lg border border-transparent focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500" rows="2"></textarea>
                                            </div>
                                            {prices.length > 0 && (
                                                <div className="mt-3 pt-3 border-t border-gray-200 dark:border-gray-600">
                                                    <h4 className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">قیمت‌های تامین‌کنندگان:</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {prices.map((price, idx) => ( <div key={idx} className="bg-gray-200 dark:bg-gray-600 text-xs px-2 py-1 rounded-full"><span className="font-semibold">{price.profiles.fullname}:</span> {formatCurrency(price.unitprice)}</div> ))}
                                                    </div>
                                                </div>
                                            )}
                                            {productProperties.length > 0 && (
                                                <div className="mt-3 pt-3 border-t border-gray-200 dark:border-gray-600">
                                                    <h4 className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">ویژگی‌های محصول:</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {productProperties.map(prop => ( <div key={prop.title} className="bg-gray-200 dark:bg-gray-600 text-xs px-2 py-1 rounded-full"><span className="font-semibold">{prop.title}:</span> {prop.value}</div> ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>
                            <button type="button" onClick={handleAddItem} className="mt-4 w-full text-center py-2 px-4 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition font-semibold">+ افزودن کالا</button>
                        </div>
                        
                        {error && <p className="text-red-500 text-sm">{error}</p>}

                        <div className="flex justify-end gap-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                            <button type="button" onClick={onClose} className="bg-gray-200 dark:bg-gray-600 py-2 px-5 rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-gray-700 transition">بازگشت</button>
                            <button type="submit" disabled={isLoading} className="bg-indigo-600 text-white py-2 px-5 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:bg-indigo-400">{isLoading ? 'در حال ثبت...' : 'ثبت تقاضا'}</button>
                        </div>
                    </form>
                    
                    {isQuickUserOpen && (
                        <QuickUserFormModal 
                            isOpen={isQuickUserOpen}
                            onClose={() => setIsQuickUserOpen(false)}
                            onSuccess={(newCustomer) => {
                                onCustomerCreated(newCustomer);
                                setCustomerId(newCustomer.id);
                                setIsQuickUserOpen(false);
                            }}
                            customerRoleId={customerRoleId}
                            marketingChannels={marketingChannels}
                            provinces={provinces}
                        />
                    )}
                </Modal>
            );
        };
        
        const EditDemandItemModal = ({ isOpen, onClose, onSave, onRefresh, itemToEdit, demand, demandStatuses, groupedStatuses, allProfiles }) => {
            const [formData, setFormData] = React.useState({ quantity: '', demand_admin_note: '', supply_admin_note: '', approved_supply_price: '', approved_supply_quantity: '' });
            const [statusId, setStatusId] = React.useState('');
            const [cancellationReason, setCancellationReason] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            const [isEmergency, setIsEmergency] = React.useState(false);
            
            // --- Assignment State ---
            const [assignedSuppliers, setAssignedSuppliers] = React.useState([]);
            const [isFetchingAssignments, setIsFetchingAssignments] = React.useState(false);
            const [stockSuppliers, setStockSuppliers] = React.useState([]); // Suppliers with stock of this product
            const [newAssignment, setNewAssignment] = React.useState({ stockSelection: '', supplierId: '', locationId: '', price: '', quantity: '' });
            const [isAssigning, setIsAssigning] = React.useState(false);
            const { addToast } = useToasts();
            
            const [assignmentMode, setAssignmentMode] = React.useState('existing'); // 'existing' | 'new'
            const [newSupplierId, setNewSupplierId] = React.useState('');
            const [newSupplierLocId, setNewSupplierLocId] = React.useState('');
            const [newSupplierStockQuantity, setNewSupplierStockQuantity] = React.useState('100'); // Initial stock
            const [isFetchingNewLocs, setIsFetchingNewLocs] = React.useState(false);
            const [combinedProfileLocs, setCombinedProfileLocs] = React.useState([]);
            const [selectedCombinedLocId, setSelectedCombinedLocId] = React.useState('');
            // --- End Assignment State ---
            
            // --- NEW: Local State for Stock Cards ---
            const [stockInputs, setStockInputs] = React.useState({});

            const isCancelled = React.useMemo(() => {
                if (!statusId) return false;
                const selectedStatus = demandStatuses.find(s => s.id === statusId);
                return selectedStatus?.main_status === 'Cancelled';
            }, [statusId, demandStatuses]);

            const cancellationReasons = ["قیمت بالا", "عدم موجودی", "عدم پاسخگویی", "به تعویق افتاده", "خرید از رقبا", "درخواست تعداد پایین", "درخواست تنوع", "هزینه ارسال بالا", "عدم اعتماد", "فاکتور بی‌پاسخ", "خرید چکی"];

            // Fetch Assignments Wrapper
            const fetchAssignedSuppliers = React.useCallback(async () => {
                if (!itemToEdit?.id) return;
                
                setIsFetchingAssignments(true);
                const { data, error } = await supabaseClient
                    .from('supplier_demand_assignment')
                    .select('id, assigned_quantity, assigned_price, supplieruserid, location:locationid(id, address, city(title, province(title))), profiles:supplieruserid(fullname, firstname, mobile, emergencyphonenumber)')
                    .eq('demand_item_id', itemToEdit.id);

                if (error) {
                    console.error("Error fetching supplier assignments:", error);
                } else {
                    setAssignedSuppliers(data || []);
                }
                setIsFetchingAssignments(false);
            }, [itemToEdit?.id]);

            const fetchStock = React.useCallback(async () => {
                if(!itemToEdit?.product?.id) return;
                
                // ۱. دریافت موجودی تامین‌کنندگان با location_id
                const { data: stockData, error: stockError } = await supabaseClient
                    .from('supplierstock')
                    .select('unitprice, quantity, lastupdatedat, supplieruserid, location_id, profiles:supplieruserid(fullname, firstname, mobile, emergencyphonenumber)')
                    .eq('productid', itemToEdit.product.id);
                    
                if (stockError) {
                    console.error("Error fetching stock:", stockError);
                    setStockSuppliers([]);
                    return;
                }
                
                if (stockData && stockData.length > 0) {
                    const supplierIds = [...new Set(stockData.map(s => s.supplieruserid))];
                    
                    // ۲. دریافت انبارهای تامین‌کنندگان یافت شده
                    const { data: locData, error: locError } = await supabaseClient
                        .from('userlocation')
                        .select('userid, location(id, address, city(title, province(title)))')
                        .in('userid', supplierIds);
                        
                    if (locError) console.error("Error fetching locations:", locError);
                    
                    // ۳. ترکیب کردن موجودی هر تامین‌کننده با انبار متناظر (بر اساس location_id)
                    const combinedStock = [];
                    stockData.forEach(stock => {
                        let matchedLoc = null;
                        if (locData) {
                            const ul = locData.find(u => u.userid === stock.supplieruserid && u.location?.id === stock.location_id);
                            if (ul) matchedLoc = ul.location;
                        }
                        
                        combinedStock.push({
                            ...stock,
                            locationid: stock.location_id,
                            location: matchedLoc
                        });
                    });
                    
                    setStockSuppliers(combinedStock);
                } else {
                    setStockSuppliers([]);
                }
            }, [itemToEdit?.product?.id]);

            // Sync stockInputs when stockSuppliers changes
            React.useEffect(() => {
                const initialInputs = {};
                stockSuppliers.forEach(s => {
                    const locId = s.locationid || 'null';
                    const key = `${s.supplieruserid}_${locId}`;
                    initialInputs[key] = {
                        price: s.unitprice || '',
                        quantity: ''
                    };
                });
                setStockInputs(initialInputs);
            }, [stockSuppliers]);

            React.useEffect(() => {
                if (assignmentMode === 'new' && combinedProfileLocs.length === 0) {
                    const fetchLocs = async () => {
                        setIsFetchingNewLocs(true);
                        const { data } = await supabaseClient
                            .from('userlocation')
                            .select('userid, location(id, address, city(title, province(title)))');
                        
                        const locMap = {};
                        if (data) {
                            data.forEach(ul => {
                                if (!locMap[ul.userid]) locMap[ul.userid] = [];
                                if (ul.location) locMap[ul.userid].push(ul.location);
                            });
                        }

                        const combined = [];
                        allProfiles.forEach(p => {
                            const locs = locMap[p.id];
                            if (locs && locs.length > 0) {
                                locs.forEach(loc => {
                                    const cityName = loc.city?.title || '';
                                    const locString = cityName ? `(${cityName} - کد ${loc.id})` : `(کد ${loc.id})`;
                                    combined.push({
                                        id: `${p.id}_${loc.id}`,
                                        supplierId: p.id,
                                        locationId: loc.id,
                                        title: `${formatProfileName(p)} ${locString} - ${p.mobile || 'بدون شماره'}`
                                    });
                                });
                            } else {
                                combined.push({
                                    id: `${p.id}_null`,
                                    supplierId: p.id,
                                    locationId: '',
                                    title: `${formatProfileName(p)} (بدون انبار) - ${p.mobile || 'بدون شماره'}`
                                });
                            }
                        });
                        setCombinedProfileLocs(combined);
                        setIsFetchingNewLocs(false);
                    };
                    fetchLocs();
                }
            }, [assignmentMode, allProfiles, combinedProfileLocs.length]);

            React.useEffect(() => {
                if (isOpen && itemToEdit && demand) {
                    setFormData({
                        quantity: itemToEdit.quantity || '',
                        demand_admin_note: itemToEdit.demand_admin_note || '',
                        supply_admin_note: itemToEdit.supply_admin_note || '',
                        approved_supply_price: itemToEdit.approved_supply_price || '',
                        approved_supply_quantity: itemToEdit.approved_supply_quantity || ''
                    });
                    setStatusId(itemToEdit.demandstatusid || '');
                    setIsEmergency(demand.is_emergency || false);
                    setCancellationReason('');
                    if (itemToEdit.demand_admin_note?.startsWith('(دلیل لغو:')) {
                        const match = itemToEdit.demand_admin_note.match(/\(دلیل لغو: (.*?)\)/);
                        if (match && match[1]) {
                             setCancellationReason(match[1]);
                             setFormData(prev => ({...prev, demand_admin_note: itemToEdit.demand_admin_note.replace(match[0], '').trim() }));
                        }
                    }

                    // Reset assignment form
                    setNewAssignment({ stockSelection: '', supplierId: '', locationId: '', price: '', quantity: '' });
                    setAssignmentMode('existing');
                    setNewSupplierId('');
                    setNewSupplierLocId('');
                    setNewSupplierStockQuantity('100');
                    setSelectedCombinedLocId('');
                    
                    // Fetch existing assignments
                    fetchAssignedSuppliers();

                    // Fetch Suppliers with stock
                    fetchStock();
                }
            }, [isOpen, itemToEdit, demand, fetchAssignedSuppliers, fetchStock]);
            
            const handleAssignmentChange = (e) => {
                const { name, value } = e.target;
                
                if (name === 'stockSelection') {
                    const selectedStock = stockSuppliers.find(s => `${s.supplieruserid}_${s.locationid}` === value);
                    if (selectedStock) {
                        setNewAssignment(prev => ({
                            ...prev,
                            stockSelection: value,
                            supplierId: selectedStock.supplieruserid,
                            locationId: selectedStock.locationid || '',
                            price: selectedStock.unitprice
                        }));
                    } else {
                        setNewAssignment(prev => ({ ...prev, stockSelection: value, supplierId: '', locationId: '', price: '' }));
                    }
                } else {
                    setNewAssignment(prev => ({ ...prev, [name]: value }));
                }
            };

            const handleStockCardChange = (key, field, value) => {
                setStockInputs(prev => ({
                    ...prev,
                    [key]: { ...prev[key], [field]: value }
                }));
            };

            const handleUpdateStockPrice = async (supplierId, locationId, newPrice) => {
                if (!newPrice) {
                    addToast("لطفا قیمت جدید را وارد کنید.", "error");
                    return;
                }
                setIsAssigning(true);
                try {
                    let query = supabaseClient
                        .from('supplierstock')
                        .update({ 
                            unitprice: Number(newPrice),
                            lastupdatedat: new Date().toISOString()
                        })
                        .eq('productid', itemToEdit.product.id)
                        .eq('supplieruserid', supplierId);
                    
                    if (locationId === 'null') {
                        query = query.is('location_id', null);
                    } else {
                        query = query.eq('location_id', locationId);
                    }

                    const { error } = await query;
                    
                    if (error) throw error;
                    addToast("قیمت با موفقیت در سیستم به‌روزرسانی شد.", "success");
                    await fetchStock(); // Refresh the list
                } catch (e) {
                    console.error("Error updating price:", e);
                    addToast("خطا در به‌روزرسانی قیمت.", "error");
                } finally {
                    setIsAssigning(false);
                }
            };

            const handleCardAssignment = async (supplierId, locationId, price, quantity) => {
                if (!quantity || !price) {
                    addToast("لطفا تعداد و قیمت را مشخص کنید.", "error");
                    return;
                }

                setIsAssigning(true);
                setError('');
                try {
                    // 1. Update the price in stock
                    let query = supabaseClient
                        .from('supplierstock')
                        .update({ 
                            unitprice: Number(price),
                            lastupdatedat: new Date().toISOString()
                        })
                        .eq('productid', itemToEdit.product.id)
                        .eq('supplieruserid', supplierId);
                        
                    if (locationId === 'null') {
                        query = query.is('location_id', null);
                    } else {
                        query = query.eq('location_id', locationId);
                    }
                    await query;

                    // 2. Create Assignment
                    const { error: assignError } = await supabaseClient.from('supplier_demand_assignment').insert({
                        demand_item_id: itemToEdit.id,
                        supplieruserid: supplierId,
                        locationid: locationId === 'null' ? null : locationId,
                        assigned_quantity: Number(quantity),
                        assigned_price: Number(price)

                    if (assignError) throw assignError;

                    // 3. Auto-fill the form
                    setFormData(prev => ({
                        ...prev,
                        approved_supply_quantity: Number(quantity),
                        approved_supply_price: Number(price)
                    }));

                    // 4. Auto-change status

                    const currentStatus = demandStatuses.find(s => s.id === statusId);

                            newStatusId = targetStatus.id;
                            setStatusId(targetStatus.id);
                        }
                    }

                    // 5. Auto-save item
                    const { error: updateError } = await supabaseClient.from('demand_item').update({
                        approved_supply_quantity: Number(quantity),
                        approved_supply_price: Number(price),
                        demandstatusid: newStatusId
                    }).eq('id', itemToEdit.id);

                    if (updateError) console.error("Error auto-updating item:", updateError);
                    
                    if (newStatusId !== statusId) {
                        await supabaseClient.from('demandstatuslog').insert({ demand_item_id: itemToEdit.id, demandstatusid: newStatusId });

                    await fetchStock();

                    addToast("تامین‌کننده با موفقیت تخصیص یافت.", "success");
                } catch (err) {
                    console.error("Assignment error:", err);
                    setError("خطا در تخصیص تامین‌کننده.");
                } finally {
                    setIsAssigning(false);
                }
            };

            const handleAssignSupplier = async () => {
                let finalSupplierId = '';
                let finalLocationId = null;

                if (assignmentMode === 'existing') {
                    if (!newAssignment.supplierId) {
                        setError("لطفا تامین‌کننده را انتخاب کنید.");
                        return;
                    }
                    finalSupplierId = newAssignment.supplierId;
                    finalLocationId = newAssignment.locationId;
                } else {
                    if (!newSupplierId) {
                        setError("لطفا تامین‌کننده جدید را انتخاب کنید.");
                        return;
                    }
                    finalSupplierId = newSupplierId;
                    finalLocationId = newSupplierLocId || null;
                }

                if (!newAssignment.quantity || !newAssignment.price) {
                    setError("لطفا تعداد و قیمت را مشخص کنید.");
                    return;
                }

                setIsAssigning(true);
                setError('');
                try {
                    // Updating or Inserting Stock
                    if (finalLocationId && itemToEdit.product?.id) {
                        const { data: existingStock, error: existingStockErr } = await supabaseClient
                            .from('supplierstock')
                            .select('location_id, productid')
                            .eq('location_id', finalLocationId)
                            .eq('productid', itemToEdit.product.id)
                            .maybeSingle();

                        if (existingStockErr && existingStockErr.code !== 'PGRST116') {
                            console.error("Error checking existing stock:", existingStockErr);
                        }

                        if (existingStock) {
                            const { error: stockError } = await supabaseClient
                                .from('supplierstock')
                                .update({ 
                                    unitprice: Number(newAssignment.price),
                                    lastupdatedat: new Date().toISOString()
                                })
                                .eq('location_id', finalLocationId)
                                .eq('productid', itemToEdit.product.id);
                            
                            if (stockError) console.error("Error updating supplier stock price:", stockError);

                            const { error: stockInsertError } = await supabaseClient
                                .from('supplierstock')
                                .insert({
                                    supplieruserid: finalSupplierId,
                                    productid: itemToEdit.product.id,
                                    location_id: finalLocationId,
                                    unitprice: Number(newAssignment.price),

                            if (stockInsertError) console.error("Error inserting new supplier stock:", stockInsertError);
                        }

                        demand_item_id: itemToEdit.id,
                        supplieruserid: finalSupplierId,
                        locationid: finalLocationId || null,

                        assigned_price: Number(newAssignment.price)

                        approved_supply_quantity: Number(newAssignment.quantity),
                        approved_supply_price: Number(newAssignment.price)

                        approved_supply_quantity: Number(newAssignment.quantity),
                        approved_supply_price: Number(newAssignment.price),
                        demandstatusid: newStatusId

                        await supabaseClient.from('demand_item_log').insert({ demand_item_id: itemToEdit.id, change_description: 'وضعیت به صورت خودکار پس از تخصیص تامین‌کننده تغییر کرد.' });

                    <form onSubmit={handleSubmit} className="space-y-4">

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">یادداشت مدیر تقاضا</label>

                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">یادداشت مدیر تامین</label>
                            <textarea name="supply_admin_note" value={formData.supply_admin_note} onChange={handleChange} className="w-full bg-gray-100 dark:bg-gray-700 p-2 rounded-lg" rows="3"></textarea>

                        {error && <p className="text-red-500 text-sm">{error}</p>}
                        <div className="flex justify-end gap-3 pt-4 border-t border-gray-200 dark:border-gray-600">
